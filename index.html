<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Pan a Descongelar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22:%22Control%20de%20Pan%22,
        %22short_name%22:%22Pan%22,
        %22start_url%22:%22.%22,
        %22display%22:%22standalone%22,
        %22background_color%22:%22%23f8fafc%22,
        %22theme_color%22:%22%230f172a%22,
        %22icons%22:[{
            %22src%22:%22https://cdn-icons-png.flaticon.com/512/2921/2921829.png%22,
            %22sizes%22:%22192x192%22,
            %22type%22:%22image/png%22
        }]
    }">
    <style>
        input[type="number"] { -webkit-appearance: none; -moz-appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 antialiased">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-white p-6 rounded-3xl border border-slate-200/80 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-slate-900 text-white p-3.5 rounded-2xl text-2xl shadow-md shadow-slate-900/10">
                    🍞
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900">
                        Control de Pan a Descongelar
                    </h1>
                </div>
            </div>
            <button onclick="guardarRegistro()" 
                    class="w-full md:w-auto bg-slate-900 hover:bg-slate-800 active:scale-[0.98] transition-all text-white px-6 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2 shadow-lg shadow-slate-900/10 text-sm tracking-wide">
                <i class="fas fa-save text-base"></i>
                GUARDAR REGISTRO DIARIO
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-3xl border border-slate-200/80 p-6 md:p-8 shadow-sm">
                    <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                        <span class="text-slate-500 text-lg"><i class="fas fa-calendar-alt"></i></span>
                        <h2 class="text-xl font-bold text-slate-900">Calculadora Diaria</h2>
                    </div>
                    
                    <div class="mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-200/60 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Fecha de Trabajo</label>
                        <input type="date" id="fecha" class="w-full sm:w-auto bg-white px-4 py-2.5 rounded-xl border border-slate-200 font-semibold text-slate-900 focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 transition-all text-sm shadow-sm">
                    </div>

                    <div id="tabla-calculadora" class="space-y-4"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-3xl border border-slate-200/80 p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-3 gap-2">
                        <div class="flex items-center gap-3">
                            <span class="text-slate-500 text-base"><i class="fas fa-history"></i></span>
                            <h2 class="text-lg font-bold text-slate-900">Historial Reciente</h2>
                        </div>
                        <button onclick="exportarAPDF()" class="bg-slate-900 hover:bg-slate-800 text-white text-[10px] font-bold px-3 py-2 rounded-xl flex items-center gap-1 shadow-md transition-all">
                            <i class="fas fa-file-pdf text-red-400"></i> Exportar PDF
                        </button>
                    </div>
                    <div id="historial-lista" class="space-y-3 max-h-[55vh] overflow-auto pr-1"></div>
                </div>

                <div id="resumen-guardado" class="hidden bg-emerald-50 border border-emerald-200/80 rounded-3xl p-6 shadow-sm shadow-emerald-700/5">
                    <h3 class="font-bold text-emerald-900 flex items-center gap-2 mb-4 text-sm">
                        <i class="fas fa-check-circle text-emerald-600 text-base"></i> Registro Guardado Correctamente
                    </h3>
                    <div id="contenido-resumen" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let productos = [
            { id: "muffin", nombre: "PAN MUFFIN", porEmpaque: 84, meta: 0, inicial: 0, etiquetaEmpaque: "Jaba 84 unidades", empaqueNombre: "jabas", porBolsa: 12 },
            { id: "tortilla", nombre: "TORTILLA 8", porEmpaque: 12, meta: 0, inicial: 0, etiquetaEmpaque: "Bolsa 12 unidades", empaqueNombre: "bolsas", porBolsa: 12 },
            { id: "regular", nombre: "PAN REGULAR", porEmpaque: 60, meta: 0, inicial: 0, etiquetaEmpaque: "Jaba Doble 60 unidades", empaqueNombre: "jabas dobles", porBolsa: 60 },
            { id: "cuarto", nombre: "PAN DE CUARTO", porEmpaque: 60, meta: 0, inicial: 0, etiquetaEmpaque: "Jaba Doble 60 unidades", empaqueNombre: "jabas dobles", porBolsa: 60 },
            { id: "bigmac", nombre: "PAN BIGMAC", porEmpaque: 30, meta: 0, inicial: 0, etiquetaEmpaque: "Jaba Individual 30 unidades", empaqueNombre: "jabas individuales", porBolsa: 30 },
            { id: "magnifica", nombre: "PAN MAGNÍFICA DE RES", porEmpaque: 50, meta: 0, inicial: 0, etiquetaEmpaque: "Jaba Doble 50 unidades", empaqueNombre: "jabas dobles", porBolsa: 50 },
            { id: "artesanal", nombre: "PAN ARTESANAL", porEmpaque: 96, meta: 0, inicial: 0, etiquetaEmpaque: "Jaba Doble 96 unidades", empaqueNombre: "jabas dobles", porBolsa: 12 },
            { id: "bollo", nombre: "PAN BOLLO", porEmpaque: 16, meta: 0, inicial: 0, etiquetaEmpaque: "Bolsa 16 unidades", empaqueNombre: "bolsas", porBolsa: 16 },
            { id: "papa", nombre: "PAN DE PAPA", porEmpaque: 60, meta: 0, inicial: 0, etiquetaEmpaque: "Jaba Doble 60 unidades", empaqueNombre: "jabas dobles", porBolsa: 60 }
        ];

        function calcularPaquetes(amount, porEmpaque, empaqueNombre) {
            const paquetes = Math.floor(amount / porEmpaque);
            const sobra = Math.round(amount % porEmpaque);
            if (paquetes === 0) return `${sobra} unidades`;
            return `${paquetes} ${empaqueNombre} y ${sobra} unidades`;
        }

        function generarCampos() {
            const container = document.getElementById('tabla-calculadora');
            container.innerHTML = '';

            productos.forEach((prod, index) => {
                const sacarHoy = Math.max(0, prod.meta - prod.inicial);
                const paquetesHoy = calcularPaquetes(sacarHoy, prod.porEmpaque, prod.empaqueNombre);
                const finalHoy = Math.max(0, prod.inicial + sacarHoy);

                const mostrarConvertidor = (prod.porBolsa === 12 || prod.porBolsa === 16);

                const div = document.createElement('div');
                div.className = "border border-slate-200/70 bg-white rounded-2xl p-5 hover:border-slate-300 transition-all shadow-sm";
                div.innerHTML = `
                    <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
                        <span class="font-bold text-slate-900 tracking-tight text-base">${prod.nombre}</span>
                        <span class="text-[11px] bg-slate-100 text-slate-600 font-semibold px-2.5 py-1 rounded-lg uppercase tracking-wider">${prod.etiquetaEmpaque}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 text-center">Meta</label>
                            <input type="number" id="meta-input-${prod.id}" value="${prod.meta}" oninput="actualizarValores(${index}, 'meta', this.value)" class="w-full text-center text-lg font-bold bg-slate-50 border border-slate-200 rounded-xl py-2 focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 focus:outline-none transition-all shadow-inner">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 text-center">Inicial (Unidades)</label>
                            <input type="number" id="inicial-input-${prod.id}" value="${prod.inicial}" oninput="actualizarValores(${index}, 'inicial', this.value)" class="w-full text-center text-lg font-bold bg-slate-50 border border-slate-200 rounded-xl py-2 focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 focus:outline-none transition-all shadow-inner">
                            
                            ${mostrarConvertidor ? `
                                <button onclick="pedirBolsas(${index})" class="w-full mt-2 text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-1.5 px-2 rounded-lg border border-slate-200 transition-colors flex items-center justify-center gap-1">
                                    <i class="fas fa-calculator text-[9px]"></i> Convertir Bolsas
                                </button>
                            ` : ''}
                        </div>
                    </div>
                    <div class="mt-4 grid grid-cols-2 gap-3">
                        <div class="bg-slate-950 text-white rounded-xl p-3 text-center shadow-sm">
                            <div class="text-slate-400 font-bold text-[10px] uppercase tracking-wider mb-0.5">A Descongelar</div>
                            <div id="sacarHoy-val-${prod.id}" class="text-xl font-black">${sacarHoy}</div>
                            <div id="paquetes-val-${prod.id}" class="text-[11px] font-bold text-amber-400 mt-0.5">${paquetesHoy}</div>
                        </div>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center flex flex-col justify-center">
                            <div class="text-slate-500 font-bold text-[10px] uppercase tracking-wider mb-0.5">Total Esperado</div>
                            <div id="final-val-${prod.id}" class="text-xl font-black text-slate-900">${finalHoy}</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function pedirBolsas(index) {
            const prod = productos[index];
            const cantBolsas = prompt(`¿Cuántas BOLSAS completas tienes de ${prod.nombre}? (Cada bolsa trae ${prod.porBolsa} unidades)`);
            
            if (cantBolsas !== null && cantBolsas !== "") {
                const numBolsas = parseInt(cantBolsas) || 0;
                const totalUnidades = numBolsas * prod.porBolsa;
                
                document.getElementById(`inicial-input-${prod.id}`).value = totalUnidades;
                actualizarValores(index, 'inicial', totalUnidades);
            }
        }

        function actualizarValores(index, campo, valor) {
            const prod = productos[index];
            prod[campo] = parseInt(valor) || 0;

            const sacarHoy = Math.max(0, prod.meta - prod.inicial);
            const paquetesHoy = calcularPaquetes(sacarHoy, prod.porEmpaque, prod.empaqueNombre);
            const finalHoy = Math.max(0, prod.inicial + sacarHoy);

            document.getElementById(`sacarHoy-val-${prod.id}`).innerText = sacarHoy;
            document.getElementById(`paquetes-val-${prod.id}`).innerText = paquetesHoy;
            document.getElementById(`final-val-${prod.id}`).innerText = finalHoy;
        }

        function guardarRegistro() {
            const fechaInput = document.getElementById('fecha').value;
            if (!fechaInput) return alert("Por favor, ingresa una fecha válida");

            const fechaObj = new Date(fechaInput + "T12:00:00");
            const fecha = `${String(fechaObj.getDate()).padStart(2,'0')}/${String(fechaObj.getMonth()+1).padStart(2,'0')}/${fechaObj.getFullYear()}`;

            let resumenHTML = `<p class="font-bold text-emerald-950 text-xs border-b border-emerald-200 pb-2 mb-3"><i class="far fa-calendar-alt mr-1"></i> TRABAJO DEL: ${fecha}</p>`;
            let historial = JSON.parse(localStorage.getItem('panHistorial')) || [];

            let datosAgregados = false;

            productos.forEach(prod => {
                const sacarHoy = Math.max(0, prod.meta - prod.inicial);
                const finalHoy = Math.max(0, prod.inicial + sacarHoy);
                const paquetesDesglose = calcularPaquetes(sacarHoy, prod.porEmpaque, prod.empaqueNombre);

                if(prod.meta > 0 || prod.inicial > 0) {
                    const registro = {
                        fecha,
                        producto: prod.nombre,
                        meta: prod.meta,
                        inicial: prod.inicial,
                        sacarHoy: sacarHoy,
                        paquetesDesglose: paquetesDesglose,
                        finalHoy: finalHoy
                    };
                    historial.push(registro);
                    datosAgregados = true;

                    resumenHTML += `
                        <div class="bg-white/80 p-3 rounded-xl border border-emerald-200/60 mb-2 shadow-sm flex justify-between items-center text-xs">
                            <div>
                                <div class="font-bold text-slate-900">${prod.nombre}</div>
                                <div class="text-[10px] text-slate-500 font-medium">A Descongelar: ${sacarHoy} (${paquetesDesglose})</div>
                            </div>
                            <div class="text-right">
                                <span class="font-extrabold text-slate-900 block text-sm">${finalHoy}</span>
                                <span class="text-[9px] text-emerald-700 font-bold uppercase tracking-wider block">Total</span>
                            </div>
                        </div>`;
                }
            });

            if(datosAgregados) {
                localStorage.setItem('panHistorial', JSON.stringify(historial));
                document.getElementById('contenido-resumen').innerHTML = resumenHTML;
                document.getElementById('resumen-guardado').classList.remove('hidden');
                alert("✅ Guardado correctamente en el historial");
                cargarHistorial();
            } else {
                alert("⚠️ Ingresa valores en al menos un producto antes de guardar.");
            }
        }

        function cargarHistorial() {
            const historial = JSON.parse(localStorage.getItem('panHistorial')) || [];
            const container = document.getElementById('historial-lista');
            container.innerHTML = '';

            if (historial.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 text-slate-400">
                        <i class="fas fa-folder-open text-2xl mb-2 block"></i>
                        <p class="text-xs font-medium">No hay registros en el historial</p>
                    </div>`;
                return;
            }

            historial.sort((a,b) => b.fecha.localeCompare(a.fecha)).forEach((r, i) => {
                const item = document.createElement('div');
                item.className = "bg-white border border-slate-200 rounded-xl p-4.5 shadow-sm hover:border-slate-300 transition-all text-xs";
                item.innerHTML = `
                    <div class="flex justify-between items-center mb-2.5">
                        <div class="font-bold text-slate-900 flex items-center gap-1.5">
                            <span class="inline-block w-1.5 h-1.5 rounded-full bg-slate-900"></span>
                            ${r.fecha} — <span class="text-slate-600">${r.producto}</span>
                        </div>
                        <button onclick="eliminarRegistro(${i})" class="text-slate-400 hover:text-red-600 p-1 rounded-lg transition-all">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[10px] text-slate-600">
                        <div class="bg-slate-50 border border-slate-100 p-2 rounded-lg">
                            <span class="block text-slate-400 font-bold uppercase text-[9px] mb-0.5">Descongelar</span>
                            <strong class="text-slate-900 text-xs">${r.sacarHoy || 0}</strong> <span class="text-[9px]">(${r.paquetesDesglose || '0 unidades'})</span>
                        </div>
                        <div class="bg-slate-50 border border-slate-100 p-2 rounded-lg">
                            <span class="block text-slate-400 font-bold uppercase text-[9px] mb-0.5">Total Pan</span>
                            <strong class="text-slate-900 text-xs">${r.finalHoy}</strong>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function eliminarRegistro(i) {
            if (confirm("¿Estás seguro de borrar este registro del historial?")) {
                let h = JSON.parse(localStorage.getItem('panHistorial')) || [];
                h.splice(i,1);
                localStorage.setItem('panHistorial', JSON.stringify(h));
                cargarHistorial();
            }
        }

        // MOTOR REVOLUCIONARIO DE EXPORTACIÓN EN VENTANA INDEPENDIENTE ANTI-PANTALLA EN BLANCO
        function exportarAPDF() {
            const historial = JSON.parse(localStorage.getItem('panHistorial')) || [];
            if (historial.length === 0) return alert("No hay datos en el historial para exportar.");

            const fechaActual = new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            
            let filasHTML = '';
            historial.sort((a,b) => b.fecha.localeCompare(a.fecha)).forEach((r, idx) => {
                const bg = idx % 2 === 0 ? '#ffffff' : '#f8fafc';
                filasHTML += `
                    <tr style="background-color: ${bg}; text-align: center; font-size: 11px;">
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; font-weight: bold; color: #334155;">${r.fecha}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; font-weight: bold; color: #0f172a;">${r.producto}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #475569;">${r.meta || 0}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #475569;">${r.inicial || 0}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #b45309; font-weight: bold; background-color: #fffbeb;">
                            ${r.sacarHoy || 0}
                            <span style="display: block; font-size: 8.5px; color: #d97706; font-weight: 500; margin-top: 1px;">(${r.paquetesDesglose || ''})</span>
                        </td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #0f172a; font-weight: 800; background-color: #f1f5f9; font-size: 11.5px;">${r.finalHoy || 0}</td>
                    </tr>`;
            });

            const ventanaReporte = window.open('', '_blank');
            ventanaReporte.document.write(`
                <html>
                <head>
                    <title>Reporte_Descongelado_Pan</title>
                    <style>
                        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; color: #1e293b; background: #ffffff; }
                        table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid #e2e8f0; }
                        th { background-color: #0f172a; color: #ffffff; padding: 11px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
                        @media print { @page { size: A4 landscape; margin: 8mm 10mm; } }
                    </style>
                </head>
                <body>
                    <div style="border-bottom: 2px solid #0f172a; padding-bottom: 10px; margin-bottom: 18px;">
                        <h2 style="margin: 0; color: #0f172a; font-size: 22px; font-weight: 800;">Reporte de Producción y Descongelado</h2>
                        <p style="margin: 4px 0 0 0; font-size: 11px; color: #64748b; font-weight: 500;">Control Histórico de Inventarios • Generado el ${fechaActual}</p>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th style="text-align:left; width: 15%;">Fecha</th>
                                <th style="text-align:left; width: 25%;">Producto</th>
                                <th style="width: 13%;">Meta Base</th>
                                <th style="width: 13%;">Conteo Inicial</th>
                                <th style="width: 20%; background-color: #78350f;">A Descongelar (Faltante)</th>
                                <th style="width: 14%; background-color: #334155;">Total Esperado</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filasHTML}
                        </tbody>
                    </table>
                    <div style="margin-top: 25px; text-align: center; border-top: 1px dashed #cbd5e1; padding-top: 10px;">
                        <p style="font-size: 9px; color: #94a3b8; margin: 0;">Este documento es un respaldo digital oficial generado desde el módulo de almacenamiento local.</p>
                    </div>
                    <script>
                        setTimeout(function(){
                            window.print();
                        }, 300);
                    <\/script>
                </body>
                </html>
            `);
            ventanaReporte.document.close();
        }

        window.onload = () => {
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            generarCampos();
            cargarHistorial();
        };
    </script>
</body>
</html>
